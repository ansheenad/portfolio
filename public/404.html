<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8f8f8;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 20px;
    }
    h1 {
      font-size: 60px;
      color: #FC2E20;
    }
    p {
      font-size: 18px;
      color: #333;
      margin: 10px 0;
    }
    a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      text-decoration: none;
      color: white;
      background: #FC2E20;
      border-radius: 5px;
      transition: 0.3s;
    }
    a:hover {
      background: #d6251a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <a href="/">Go Back Home</a>
  </div>
  <script>
    // Redirect all 404s back to index.html (React handles the route)
    setTimeout(() => {
      window.location.replace("/");
    }, 3000);
  </script>
</body>
</
